# ==============================================================================
# GitHub Actions — CI Pipeline
# ==============================================================================
# Runs on every push and PR. Ensures code quality before merge.
# ==============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aml
          POSTGRES_PASSWORD: aml
          POSTGRES_DB: aml
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aml"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ai]"

      - name: Run tests
        env:
          AML_DATABASE_URL: "postgresql+asyncpg://aml:aml@localhost:5432/aml"
          AML_LLM_PROVIDER: "mock"
          AML_VECTOR_DB_PROVIDER: "mock"
          AML_ENVIRONMENT: "test"
        run: pytest --cov=aml --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
